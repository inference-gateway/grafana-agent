apiVersion: adl.inference-gateway.com/v1
kind: Agent
metadata:
  name: grafana-agent
  description: A2A agent server for grafana dashboards automation tasks
  version: 0.2.2
spec:
  capabilities:
    streaming: true
    pushNotifications: false
    stateTransitionHistory: false
  config:
    grafana:
      deployEnabled: false
      url: ""
      apiKey: ""
      orgID: ""
    tools:
      read:
        enabled: true
  services:
    grafana:
      type: service
      interface: Grafana
      factory: NewGrafanaService
      description: Grafana service for accessing Grafana API
    promql:
      type: service
      interface: PromQL
      factory: NewPromQLService
      description: PromQL service for building and validating Prometheus queries
  agent:
    provider: ""
    model: ""
    systemPrompt: |
      You are a Grafana expert. Your role is to guide users in designing highly effective, visually clear, and actionable dashboards.
      You provide best practices for data visualization, panel configuration, query optimization, alerting, and overall dashboard usability.
      Always offer practical examples and explain the reasoning behind your recommendations.

      When using Prometheus-related tools:
      - Use the PROMETHEUS_URL environment variable for prometheus_url parameters (default: http://prometheus.grafana-agent.svc.cluster.local:9090)
      - The Prometheus server is available at this internal Kubernetes service URL

      When using Grafana-related tools:
      - Use the GRAFANA_URL environment variable for grafana_url parameters if not explicitly provided by the user
  tools:
    - id: read
    - id: discover_metrics
      name: discover_metrics
      inject:
        - logger
        - promql
      description:
        Discovers available metrics from a Prometheus endpoint with optional
        filtering
      tags:
        - promql
        - prometheus
        - metrics
        - discovery
      schema:
        type: object
        properties:
          prometheus_url:
            type: string
            description: Prometheus server URL to discover metrics from
          name_pattern:
            type: string
            description: Optional regex pattern to filter metrics by name
          metric_type:
            type: string
            description:
              Optional metric type filter (counter, gauge, histogram, summary)
            enum:
              - counter
              - gauge
              - histogram
              - summary
        required:
          - prometheus_url
    - id: generate_promql_queries
      name: generate_promql_queries
      inject:
        - logger
        - promql
      description:
        Generates PromQL query suggestions for given metric names by querying
        Prometheus metadata
      tags:
        - promql
        - prometheus
        - query
        - metrics
      schema:
        type: object
        properties:
          prometheus_url:
            type: string
            description: Prometheus server URL for querying metric metadata
          metric_names:
            type: array
            items:
              type: string
            description: Array of metric names to generate queries for
        required:
          - prometheus_url
          - metric_names
    - id: validate_promql_query
      name: validate_promql_query
      inject:
        - logger
        - promql
      description: Validates a PromQL query against a Prometheus server
      tags:
        - promql
        - prometheus
        - validation
      schema:
        type: object
        properties:
          prometheus_url:
            type: string
            description: Prometheus server URL to validate against
          query:
            type: string
            description: PromQL query to validate
        required:
          - prometheus_url
          - query
    - id: create_dashboard
      name: create_dashboard
      inject:
        - logger
        - grafana
        - config.grafana
      description:
        Creates a Grafana dashboard with specified panels, queries, and
        configurations
      tags:
        - grafana
        - dashboard
        - visualization
      schema:
        type: object
        properties:
          dashboard_title:
            type: string
            description: The title of the Grafana dashboard
          description:
            type: string
            description: Description of what the dashboard monitors or displays
          grafana_url:
            type: string
            description:
              Grafana server URL (overrides default configuration if provided)
          deploy:
            type: boolean
            description:
              Whether to deploy the dashboard to Grafana (requires grafana_url
              and GRAFANA_DEPLOY_ENABLED=true)
          tags:
            type: array
            items:
              type: string
            description: Tags to categorize the dashboard
          panels:
            type: array
            description:
              Array of panel configurations (title, type, queries, etc.)
            items:
              type: object
          time_range:
            type: object
            description: Default time range for the dashboard (from, to)
            properties:
              from:
                type: string
              to:
                type: string
          refresh_interval:
            type: string
            description: Auto-refresh interval (e.g., "5s", "1m", "5m")
          variables:
            type: array
            description: Dashboard template variables for dynamic queries
            items:
              type: object
        required:
          - dashboard_title
          - panels
    - id: deploy_dashboard
      name: deploy_dashboard
      inject:
        - logger
        - grafana
        - config.grafana
      description: Deploys a dashboard JSON to Grafana (Cloud or self-hosted)
      tags:
        - grafana
        - dashboard
        - deployment
      schema:
        type: object
        properties:
          dashboard_json:
            type: object
            description: The complete dashboard JSON object to deploy
          grafana_url:
            type: string
            description:
              Grafana server URL (user provides in prompt or uses config
              default)
          folder_uid:
            type: string
            description:
              Optional folder UID where the dashboard should be deployed
          overwrite:
            type: boolean
            description:
              Whether to overwrite an existing dashboard with the same UID
              (default true)
          message:
            type: string
            description:
              Optional commit message describing the dashboard changes
        required:
          - dashboard_json
  skills:
    - id: promql
      source: https://github.com/grafana/skills/tree/6311c4f4d36db3c5a85686ef2b3ce5fed4e53c0c/skills/grafana-core/promql
    - id: dashboarding
      source: https://github.com/grafana/skills/tree/6311c4f4d36db3c5a85686ef2b3ce5fed4e53c0c/skills/grafana-core/dashboarding
  examples:
    - title: Discover metrics for a service
      description: >-
        Ask "What HTTP metrics are exposed in Prometheus matching http_.*?" and
        the agent uses discover_metrics to list the matching series, optionally
        filtered by metric type (counter, gauge, histogram, summary).
    - title: Build and validate a PromQL query
      description: >-
        Ask "Give me the p99 request latency per endpoint" and the agent drafts
        PromQL with generate_promql_queries, applies the promql skill's best
        practices, and confirms it parses against Prometheus with
        validate_promql_query before returning it.
    - title: Create a dashboard for a service
      description: >-
        Ask "Create a RED-method dashboard for my checkout service" and the
        agent uses the dashboarding skill and create_dashboard to assemble time
        series and stat panels wired to validated PromQL queries, with
        thresholds and template variables.
    - title: Deploy a dashboard to Grafana
      description: >-
        Provide a Grafana URL and API key, then ask "Deploy this dashboard to my
        Grafana Cloud instance" and the agent pushes the dashboard JSON with
        deploy_dashboard (guarded by GRAFANA_DEPLOY_ENABLED) to Grafana Cloud or
        a self-hosted instance.
  documentation:
    pages:
      - title: Getting Started
        path: docs/getting-started.md
        description: >-
          Run the agent, connect it to an LLM, Prometheus, and Grafana, and send
          your first request.
      - title: Configuration
        path: docs/configuration.md
        description: >-
          Environment variables for the LLM client, Prometheus, and Grafana
          deployment.
      - title: Usage
        path: docs/usage.md
        description: >-
          The discover, query, build, and deploy workflow and the tools behind
          it.
  server:
    port: 8080
    debug: false
    scheme: http
  language:
    go:
      module: github.com/inference-gateway/grafana-agent
      version: "1.26.4"
      vendor:
        deps:
          - github.com/stretchr/testify@v1.11.1
        devdeps:
          - github.com/maxbrunsfeld/counterfeiter/v6@v6.11.2
  hooks:
    post:
      - go mod tidy
      - go fmt ./...
      - go generate ./...
  scm:
    provider: github
    url: https://github.com/inference-gateway/grafana-agent
    github_app: true
    issue_templates: false
    dependabot: true
    ci: true
    cd: true
    app_id_secret: RELEASER_APP_ID
    app_private_key_secret: RELEASER_APP_PRIVATE_KEY
  development:
    sandbox:
      flox:
        enabled: true
      devcontainer:
        enabled: false
      dockerCompose:
        enabled: true
    ai:
      orchestrators:
        claudecode:
          enabled: true
          appIdSecret: CLAUDE_APP_ID
          appPrivateKeySecret: CLAUDE_APP_PRIVATE_KEY
        infer:
          enabled: true
          appIdSecret: INFER_APP_ID
          appPrivateKeySecret: INFER_APP_PRIVATE_KEY
        codex:
          enabled: false
        gemini:
          enabled: false
        opencode:
          enabled: false
    deps: []
